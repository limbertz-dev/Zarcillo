name: Azure App Service CI/CD — Zarcillo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build y Deploy a Azure App Service

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_LAMP_COMMAND_ENDPOINT: ${{ secrets.NEXT_PUBLIC_LAMP_COMMAND_ENDPOINT }}

      - name: Empaquetar artefacto standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          zip -r ../../deploy.zip . --quiet
          echo "Tamaño del artefacto:"
          du -sh ../../deploy.zip

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy a Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          package: deploy.zip